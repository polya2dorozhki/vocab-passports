<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Паспорта лексических единиц · «Учусь на русском!» 5–8</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#1a1a2e; --ink-mid:#44445a; --ink-light:#9494aa; --paper:#fafaf7;
  --card-bg:#fff; --accent:#2d5be3; --accent-soft:#e8eeff;
  --kw:#1a6b3c; --kw-soft:#e2f5eb; --tw:#7c2d8e; --tw-soft:#f5e8ff;
  --reading:#c84b00; --grammar:#0057a8; --writing:#00786e; --speaking:#8b5e00;
  --border:#e4e4ee; --shadow:0 2px 12px rgba(0,0,0,0.07);
  --shadow-lg:0 8px 40px rgba(0,0,0,0.13); --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;}

header{background:var(--ink);color:#fff;padding:32px 48px 24px;position:relative;overflow:hidden;}
header::before{content:'';position:absolute;top:-60px;right:-60px;width:280px;height:280px;border-radius:50%;background:rgba(45,91,227,0.12);}
.h-label{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.45);margin-bottom:8px;}
header h1{font-family:'Playfair Display',serif;font-size:clamp(20px,4vw,36px);font-weight:700;line-height:1.2;margin-bottom:8px;}
header h1 em{font-style:italic;color:#8ba4ff;}
.h-sub{font-size:13px;color:rgba(255,255,255,0.55);max-width:560px;line-height:1.5;}

.controls{padding:16px 48px;background:var(--card-bg);border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:center;flex-wrap:wrap;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
.search-wrap{position:relative;flex:1;min-width:180px;}
.search-wrap input{width:100%;padding:8px 12px 8px 34px;border:1.5px solid var(--border);border-radius:var(--r);font-family:'IBM Plex Sans',sans-serif;font-size:14px;color:var(--ink);background:var(--paper);outline:none;transition:border-color 0.2s;}
.search-wrap input:focus{border-color:var(--accent);}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--ink-light);font-size:14px;}
.filters{display:flex;gap:7px;flex-wrap:wrap;}
.fb{padding:6px 13px;border-radius:20px;border:1.5px solid var(--border);background:var(--paper);font-family:'IBM Plex Sans',sans-serif;font-size:12px;font-weight:500;color:var(--ink-mid);cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.fb:hover{border-color:var(--accent);color:var(--accent);}
.fb.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.fb.kw.active{background:var(--kw);border-color:var(--kw);}
.fb.tw.active{background:var(--tw);border-color:var(--tw);}
.fb.ph.active{background:#7a4e00;border-color:#7a4e00;}
.sep-v{width:1px;background:var(--border);height:22px;}
.cnt{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-light);margin-left:auto;white-space:nowrap;}

.grid-wrapper{padding:24px 48px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(272px,1fr));gap:14px;}

.wcard{background:var(--card-bg);border:1.5px solid var(--border);border-radius:var(--r);padding:16px 18px;cursor:pointer;transition:all 0.18s;}
.wcard:hover{border-color:var(--accent);box-shadow:var(--shadow-lg);transform:translateY(-2px);}
.ct{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
.cf{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;line-height:1;}
.cpos{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--ink-light);background:var(--paper);border:1px solid var(--border);border-radius:4px;padding:1px 5px;margin-top:3px;}
.sp{font-size:10px;font-weight:500;padding:2px 9px;border-radius:10px;}
.sp-kw{background:var(--kw-soft);color:var(--kw);}
.sp-tw{background:var(--tw-soft);color:var(--tw);}
.sp-ph{background:#fdf0e0;color:#7a4e00;font-style:italic;}
.cg{font-size:10px;color:var(--ink-light);margin-bottom:10px;font-family:'IBM Plex Mono',monospace;}
.cms{display:flex;gap:12px;}
.met{display:flex;flex-direction:column;align-items:center;gap:1px;}
.mv{font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:500;color:var(--ink);}
.ml{font-size:8px;text-transform:uppercase;letter-spacing:1px;color:var(--ink-light);}
.mbar{margin-top:10px;height:3px;border-radius:2px;background:var(--border);overflow:hidden;}
.mbar-f{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),#7b9cff);}

.overlay{display:none;position:fixed;inset:0;background:rgba(26,26,46,0.5);z-index:200;backdrop-filter:blur(3px);align-items:center;justify-content:center;padding:20px;}
.overlay.open{display:flex;}
.modal{background:var(--card-bg);border-radius:16px;width:100%;max-width:740px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:su 0.2s ease;}
@keyframes su{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.mh{padding:24px 28px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;position:sticky;top:0;background:var(--card-bg);z-index:1;}
.mf{font-family:'Playfair Display',serif;font-size:34px;font-weight:700;line-height:1;margin-bottom:5px;}
.mm{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.mc{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);background:none;cursor:pointer;font-size:16px;color:var(--ink-mid);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;}
.mc:hover{background:var(--paper);border-color:var(--ink-mid);}
.mb{padding:20px 28px 28px;}
.m4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
.mb-block{background:var(--paper);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;text-align:center;}
.mb-v{font-family:'IBM Plex Mono',monospace;font-size:26px;font-weight:500;line-height:1;margin-bottom:3px;}
.mb-l{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--ink-light);}
.mb-s{font-size:9px;color:var(--ink-light);margin-top:1px;}
.sec{font-family:'IBM Plex Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--ink-light);margin:16px 0 8px;}
.chain{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.cn{padding:3px 8px;border-radius:5px;font-family:'IBM Plex Mono',monospace;font-size:10px;border:1px solid var(--border);color:var(--ink-mid);background:var(--paper);}
.cn-src{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500;}
.cn-found{background:var(--accent-soft);border-color:#93aaff;color:var(--accent);}
.ca{font-size:12px;color:var(--ink-light);}
.sk-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.sk-n{font-family:'IBM Plex Mono',monospace;font-size:11px;width:62px;color:var(--ink-mid);}
.sk-bw{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.sk-bf{height:100%;border-radius:3px;}
.sk-p{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-mid);width:30px;text-align:right;}

/* Lessons with click */
.lesson-btn{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:7px 10px;background:var(--paper);border:1px solid var(--border);border-radius:7px;cursor:pointer;transition:all 0.15s;text-align:left;width:100%;font-family:'IBM Plex Sans',sans-serif;}
.lesson-btn:hover{border-color:var(--accent);background:var(--accent-soft);}
.lesson-btn-title{font-size:12px;color:var(--ink-mid);font-style:italic;}
.lesson-btn-hint{font-size:10px;color:var(--ink-light);}
.lesson-btn.active{border-color:var(--accent);background:var(--accent-soft);}
.ctx-box{margin-top:6px;padding:10px 12px;background:#fff;border:1px solid var(--border);border-radius:7px;border-left:3px solid var(--accent);}
.ctx-sentence{font-size:13px;color:var(--ink);line-height:1.6;}
.ctx-sentence mark{background:#fff3a0;border-radius:3px;padding:0 2px;font-weight:500;}
.ctx-empty{font-size:12px;color:var(--ink-light);font-style:italic;}

.macro-chips{display:flex;gap:8px;flex-wrap:wrap;}
.mc-chip{padding:6px 12px;background:var(--paper);border:1px solid var(--border);border-radius:7px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-mid);}
.mc-chip strong{color:var(--ink);font-weight:500;}

.empty{text-align:center;padding:80px 24px;color:var(--ink-light);}
.empty-icon{font-size:44px;margin-bottom:10px;}
.empty h3{font-family:'Playfair Display',serif;font-size:20px;color:var(--ink-mid);margin-bottom:4px;}

@media(max-width:600px){
  header,.controls,.grid-wrapper{padding-left:16px;padding-right:16px;}
  .m4{grid-template-columns:repeat(2,1fr);}
  .mb{padding:14px 16px 20px;}
  .mh{padding:16px;}
}
</style>
</head>

  </div>
</div>

  'b3_res1':'Закреп.1','b3_res2':'Закреп.2','b3_res3':'Закреп.3',
  'b4_l0':'Вводный','b4_l1':'Урок 1','b4_l2':'Урок 2','b4_l3':'Урок 3','b4_l4':'Урок 4','b4_l5':'Урок 5','b4_l6':'Урок 6',
  'b4_rus1':'Россия 1','b4_rus2':'Россия 2','b4_rus3':'Россия 3','b4_rus4':'Россия 4','b4_rus5':'Россия 5','b4_rus6':'Россия 6',
};

const filters = {section:'all', grade:'all', type:'all'};

function setFilter(btn) {
  const f = btn.dataset.f, v = btn.dataset.v;
  filters[f] = v;
  document.querySelectorAll(`.fb[data-f="${f}"]`).forEach(b => {
    b.classList.toggle('active', b.dataset.v === v);
  });
  render();
}

function filtered() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  return DATA.filter(c => {
    if (filters.section !== 'all' && c.source_section !== filters.section) return false;
    if (filters.grade !== 'all' && String(c.source_grade) !== filters.grade) return false;
    if (filters.type !== 'all' && c.entry_type !== filters.type) return false;
    if (q && !c.form.toLowerCase().includes(q) && !c.lemma.toLowerCase().includes(q)) return false;
    return true;
  });
}

function noun(n, f1, f2, f5) {
  const m = n%100, m1 = n%10;
  if (m>=11&&m<=19) return f5;
  if (m1===1) return f1;
  if (m1>=2&&m1<=4) return f2;
  return f5;
}

function render() {
  const cards = filtered();
  document.getElementById('cnt').textContent = cards.length + ' ' + noun(cards.length,'единица','единицы','единиц');
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  if (!cards.length) { grid.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display = 'none';
  grid.innerHTML = cards.map(cardHTML).join('');
}

function spClass(c) {
  if (c.entry_type==='phrase') return 'sp-ph';
  return c.source_section==='keywords' ? 'sp-kw' : 'sp-tw';
}
function spLabel(c) {
  if (c.entry_type==='phrase') return '≈ ' + c.source_section;
  return c.source_section;
}

function cardHTML(c) {
  const pct = c.ds_norm !== null ? Math.round(c.ds_norm*100) : 0;
  const sp = spClass(c), lbl = spLabel(c);
  const title = c.source_lesson_title ? `«${c.source_lesson_title.slice(0,26)}${c.source_lesson_title.length>26?'…':''}»` : '';
  return `<div class="wcard" onclick="openModal('${c.id.replace(/'/g,"\'")}')">
    <div class="ct">
      <div><div class="cf">${c.form}</div><div class="cpos">${c.pos}</div></div>
      <span class="sp ${sp}">${lbl}</span>
    </div>
    <div class="cg">${c.source_grade} кл. · ${POS_LABELS[c.source_unit]||c.source_unit} · ${title}</div>
    <div class="cms">
      <div class="met"><span class="mv">${c.freq_total}</span><span class="ml">freq</span></div>
      <div class="met"><span class="mv">${c.ds}</span><span class="ml">DS</span></div>
      <div class="met"><span class="mv">${c.ds_norm!==null?c.ds_norm.toFixed(2):'—'}</span><span class="ml">DS_norm</span></div>
      ${c.dp!==null?`<div class="met"><span class="mv">${c.dp.toFixed(2)}</span><span class="ml">DP</span></div>`:''}
    </div>
    <div class="mbar"><div class="mbar-f" style="width:${pct}%"></div></div>
  </div>`;
}

function highlight(sentence, form) {
  if (!sentence || !form) return sentence;
  // Build pattern from form and lemma variants
  const escaped = form.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  const re = new RegExp('(' + escaped + ')', 'gi');
  return sentence.replace(re, '<mark>$1</mark>');
}

let openLessonIdx = null;

function openModal(id) {
  const c = DATA.find(x => x.id===id);
  if (!c) return;
  openLessonIdx = null;

  const sp = spClass(c), lbl = spLabel(c);
  document.getElementById('m-form').textContent = c.form;
  document.getElementById('m-meta').innerHTML = `
    <span class="sp ${sp}">${lbl}</span>
    <span class="cpos">${c.pos}</span>
    <span class="cpos">${c.entry_type==='phrase'?'словосочетание':'слово'}</span>`;

  const skills = ['reading','grammar','writing','speaking'];
  const skillColors = {reading:'var(--reading)',grammar:'var(--grammar)',writing:'var(--writing)',speaking:'var(--speaking)'};

  // Chain
  const allNodes = [c.source_unit, ...c.positions_found];
  const chainHTML = allNodes.length > 1 ? `
    <div class="sec">Цепочка рециркуляции · ${c.source_grade} кл.</div>
    <div class="chain">
      ${allNodes.map((p,i)=>
        `${i>0?'<span class="ca">→</span>':''}<span class="cn ${i===0?'cn-src':'cn-found'}" title="${p}">${POS_LABELS[p]||p}</span>`
      ).join('')}
    </div>
    <p style="font-size:10px;color:var(--ink-light);margin-top:5px">
      Введено: ${POS_LABELS[c.source_unit]||c.source_unit} · Позиций рециркуляции: ${c.positions_found.length}
    </p>` : '';

  // Skills
  const skillsHTML = c.dp!==null && Object.keys(c.skills_pct).length ? `
    <div class="sec">Skills-профиль · DP = ${c.dp.toFixed(3)}</div>
    ${skills.map(s=>`
      <div class="sk-row">
        <span class="sk-n">${s}</span>
        <div class="sk-bw"><div class="sk-bf" style="width:${c.skills_pct[s]||0}%;background:${skillColors[s]}"></div></div>
        <span class="sk-p">${(c.skills_pct[s]||0).toFixed(0)}%</span>
      </div>`).join('')}` : '';

  // Lessons with context
  let lessonsHTML = '';
  if (c.lesson_titles_found.length > 0) {
    lessonsHTML = `<div class="sec">Уроки с вхождениями <span style="font-size:9px;font-style:normal;color:var(--ink-light)">(нажми чтобы увидеть пример)</span></div>
    <div id="lessons-list" style="display:flex;flex-direction:column;gap:5px;">
    ${c.lesson_titles_found.map((t,i) => {
      const hasEx = c.examples && c.examples.length > 0;
      return `<button class="lesson-btn" onclick="toggleLesson(${i}, this, '${c.id.replace(/'/g,"\'")}')">
        <span class="lesson-btn-title">«${t}»</span>
        ${hasEx ? '<span class="lesson-btn-hint">▸ пример</span>' : ''}
      </button>
      <div id="ctx-${i}" style="display:none"></div>`;
    }).join('')}
    </div>`;
  }

  // Macro
  const macroHTML = c.macro_ds!==null ? `
    <div class="sec">Макрорециркуляция (между классами)</div>
    <div class="macro-chips">
      <div class="mc-chip">macro DS <strong>${c.macro_ds}</strong></div>
      <div class="mc-chip">macro freq <strong>${c.macro_freq}</strong></div>
      <div class="mc-chip">Классы <strong>${c.macro_grades}</strong></div>
    </div>` : `
    <div class="sec">Макрорециркуляция</div>
    <p style="font-size:12px;color:var(--ink-light)">Не зафиксирована в следующих классах.</p>`;

  document.getElementById('m-body').innerHTML = `
    <div class="m4">
      <div class="mb-block"><div class="mb-v">${c.freq_total}</div><div class="mb-l">freq</div><div class="mb-s">в ${c.source_grade} классе</div></div>
      <div class="mb-block"><div class="mb-v">${c.ds}</div><div class="mb-l">DS</div><div class="mb-s">${c.positions_found.length} позиций</div></div>
      <div class="mb-block"><div class="mb-v">${c.ds_norm!==null?c.ds_norm.toFixed(3):'—'}</div><div class="mb-l">DS_norm</div><div class="mb-s">DS / N_avail</div></div>
      <div class="mb-block"><div class="mb-v">${c.dp!==null?c.dp.toFixed(3):'—'}</div><div class="mb-l">DP</div><div class="mb-s">skills дисперсия</div></div>
    </div>
    ${chainHTML}${skillsHTML}${lessonsHTML}${macroHTML}`;

  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function toggleLesson(idx, btn, cardId) {
  const c = DATA.find(x => x.id===cardId);
  const box = document.getElementById('ctx-'+idx);
  
  if (openLessonIdx === idx) {
    box.style.display = 'none';
    btn.classList.remove('active');
    openLessonIdx = null;
    return;
  }
  
  // Close previous
  if (openLessonIdx !== null) {
    const prev = document.getElementById('ctx-'+openLessonIdx);
    if (prev) prev.style.display = 'none';
    document.querySelectorAll('.lesson-btn').forEach(b=>b.classList.remove('active'));
  }
  
  openLessonIdx = idx;
  btn.classList.add('active');
  
  if (c.examples && c.examples.length > 0) {
    // Pick best example (cycle through if multiple lessons)
    const ex = c.examples[Math.min(idx, c.examples.length-1)];
    const highlighted = highlight(ex.sentence, c.form);
    box.innerHTML = `<div class="ctx-box"><div class="ctx-sentence">${highlighted}</div></div>`;
  } else {
    box.innerHTML = `<div class="ctx-box"><div class="ctx-empty">Пример не найден в данном уроке</div></div>`;
  }
  box.style.display = 'block';
}

function closeModal(e) { if (e.target===document.getElementById('overlay')) closeModalDirect(); }
function closeModalDirect() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
  openLessonIdx = null;
}
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModalDirect(); });

render();
</script>
</body>
</html>
